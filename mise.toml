[tools]
rust = "1.92.0"

[tasks.install]
run = "cargo install --path ."

[tasks.build]
run = "cargo build"

[tasks.build-release]
run = "cargo build --release"

[tasks.check]
run = ["cargo fmt -- --check", "cargo clippy -- -D warnings"]

[tasks.test]
run = "cargo test"

[tasks.fetch-fixtures]
run = "./scripts/fetch-fixtures.sh"

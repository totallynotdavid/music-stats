name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v6
        with:
          name: music-stats-linux-x86_64
          path: target/release/music-stats

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: release
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup update stable

      - name: Obtain crates.io publish token via OIDC
        uses: rust-lang/crates-io-auth-action@bf95dfc48e3ab4f22e1432883624ee2240b876e6
        id: auth

      - name: Publish to crates.io
        run: |
          echo "Publishing crate..."
          CARGO_REGISTRY_TOKEN="${{ steps.auth.outputs.token }}" cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
